<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Level Windows Gantt (Standalone App)</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        /* Bulletproof layout constraints */
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background-color: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            display: flex;
            flex-direction: column;
        }
        
        /* UI Bar */
        #ui_controls {
            flex: 0 0 auto; 
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px;
            background-color: #222;
            border-bottom: 1px solid #444;
            align-items: center;
        }
        
        #ui_controls select, #ui_controls input, #ui_controls button {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        #ui_controls select:hover, #ui_controls input:hover { border-color: #777; }

        #ui_controls button {
            background-color: #008FFB;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        #ui_controls button:hover { background-color: #0076d1; }

        /* The Date Rocker Group */
        .date-rocker {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .date-rocker button {
            padding: 8px 10px;
            font-size: 12px;
            background-color: #444; 
        }
        
        .date-rocker button:hover { background-color: #555; }

        /* Chart Wrapper */
        #chart_wrapper {
            flex: 1 1 auto; 
            position: relative;
            width: 100%;
        }

        #chart_container { 
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
    </style>
</head>
<body>
    
    <div id="ui_controls">
        <select id="filter-project"><option value="">All Projects</option></select>
        <select id="filter-source"><option value="">All Sources</option></select>
        <select id="filter-datum"><option value="">All Datums</option></select>
        <select id="filter-line"><option value="">All Lines</option></select>
        
        <div class="date-rocker">
            <button onclick="adjustDate(-1)" title="Previous Day">&#9664;</button>
            <input type="date" id="filter-date_">
            <button onclick="adjustDate(1)" title="Next Day">&#9654;</button>
        </div>

        <button onclick="resetFilters()">Reset Filters</button>
    </div>

    <div id="chart_wrapper">
        <div id="chart_container"></div>
    </div>

    <script type="text/javascript">
        const featureServiceUrl = "https://services2.arcgis.com/C8EMgrsFcRFL6LrL/arcgis/rest/services/stofs_pred_utc/FeatureServer/0/query";
        const apiKey = "AAPTaH7OehDzKeYnCi_rxWuBJ0g..o1c0X6U0lqnbVVsF1hYhbFRQABeJbAleNkr1OEtiDLyGANPbe3XgyDCFF0wEKOz5f2GC__2Ff7YO972xlf5oshHeayTI7okMi2Ns0uJtjZ3YEF4dcGuH1GFkW4WjEf3uq94T7W2FyUePpmTH9oZO2oHzdwLB1PyBtWxGtAy8fb881ta7ch2-I7OJnMOXHEPN02w_TdzswKlcwjNAiJcpbRcFNFaVqkkFGf3xsrE710w8l3L5LSEW594ssQv4tMNvy9EtDsx18g..AT2_eCzFENFL"; 
        
        let myChart;
        let lastUrl = ""; 

        function getTodayString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function adjustDate(daysToMove) {
            const dateInput = document.getElementById('filter-date_');
            if (!dateInput.value) return;

            const parts = dateInput.value.split('-');
            const currentDate = new Date(parts[0], parts[1] - 1, parts[2]);
            
            currentDate.setDate(currentDate.getDate() + daysToMove);
            
            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            const newDateStr = `${yyyy}-${mm}-${dd}`;
            
            dateInput.value = newDateStr;
            const url = new URL(window.location);
            url.searchParams.set('date_', newDateStr);
            window.history.pushState({}, '', url);
            
            fetchWaterLevels();
        }

        async function buildUI() {
            const fields = ['project', 'source', 'datum', 'line_name'];
            
            for (let field of fields) {
                const params = new URLSearchParams({
                    where: "1=1",
                    outFields: field,
                    returnDistinctValues: "true",
                    returnGeometry: "false",
                    f: "json",
                    token: apiKey
                });

                try {
                    const res = await fetch(`${featureServiceUrl}?${params.toString()}`);
                    const data = await res.json();
                    if (data.features) {
                        const uniqueVals = [...new Set(data.features.map(f => f.attributes[field]).filter(v => v))].sort();
                        const selectId = field === 'line_name' ? 'filter-line' : `filter-${field}`;
                        const selectEl = document.getElementById(selectId);
                        
                        if(selectEl) {
                            uniqueVals.forEach(val => {
                                const opt = document.createElement('option');
                                opt.value = val;
                                opt.textContent = val;
                                selectEl.appendChild(opt);
                            });
                        }
                    }
                } catch (e) { console.error(`Failed to load ${field} options:`, e); }
            }

            const url = new URL(window.location);
            let urlChanged = false;

            let currentDateParam = url.searchParams.get('date_');
            if (!currentDateParam || currentDateParam === "null") {
                currentDateParam = getTodayString();
                url.searchParams.set('date_', currentDateParam);
                urlChanged = true;
            }

            let currentProjectParam = url.searchParams.get('project');
            if (!currentProjectParam || currentProjectParam === "null") {
                const projectDropdown = document.getElementById('filter-project');
                if (projectDropdown && projectDropdown.options.length > 1) {
                    currentProjectParam = projectDropdown.options[1].value;
                    url.searchParams.set('project', currentProjectParam);
                    urlChanged = true;
                }
            }

            if (urlChanged) {
                window.history.replaceState({}, '', url); 
            }

            ['project', 'source', 'datum', 'line', 'date_'].forEach(param => {
                const val = url.searchParams.get(param);
                if (val && val !== "null") {
                    const el = document.getElementById(`filter-${param}`);
                    if (el) el.value = val;
                }
            });

            document.querySelectorAll('#ui_controls select, #ui_controls input').forEach(el => {
                el.addEventListener('change', (e) => {
                    const currentUrl = new URL(window.location);
                    const paramName = e.target.id.replace('filter-', '');
                    
                    if (e.target.value) {
                        currentUrl.searchParams.set(paramName, e.target.value);
                    } else {
                        currentUrl.searchParams.delete(paramName); 
                    }
                    
                    window.history.pushState({}, '', currentUrl);
                    fetchWaterLevels(); 
                });
            });
        }

        function resetFilters() {
            const url = new URL(window.location.origin + window.location.pathname);
            const todayStr = getTodayString();
            
            url.searchParams.set('date_', todayStr);
            
            let firstProj = "";
            const projectDropdown = document.getElementById('filter-project');
            if (projectDropdown && projectDropdown.options.length > 1) {
                firstProj = projectDropdown.options[1].value;
                url.searchParams.set('project', firstProj);
            }
            
            window.history.pushState({}, '', url);

            document.querySelectorAll('#ui_controls select').forEach(s => s.value = '');
            if (firstProj) projectDropdown.value = firstProj;
            document.getElementById('filter-date_').value = todayStr;
            
            fetchWaterLevels();
        }

        function colorizeYAxisText() {
            const labels = document.querySelectorAll('.apexcharts-yaxis-label');
            labels.forEach(label => {
                const text = label.textContent || "";
                let targetColor = "";
                
                if (text.includes('PYDRO')) targetColor = '#eb97d8';
                else if (text.includes('STOFS')) targetColor = '#80ecf0';
                
                if (targetColor) {
                    label.setAttribute('fill', targetColor);
                    label.style.fill = targetColor;
                    label.querySelectorAll('tspan').forEach(t => {
                        t.setAttribute('fill', targetColor);
                        t.style.fill = targetColor;
                    });
                }
            });
        }

        async function fetchWaterLevels() {
            const currentUrl = window.location.search;
            if (currentUrl === lastUrl && myChart) return;
            lastUrl = currentUrl;

            const urlParams = new URLSearchParams(currentUrl);
            let sqlWhere = "1=1";
            const filters = ['project', 'datum', 'line_name', 'date_', 'line', 'source'];
            
            filters.forEach(key => {
                const val = urlParams.get(key);
                if (val && val !== "" && val !== "null") {
                    sqlWhere += ` AND ${key === 'line' ? 'line_name' : key} = '${val}'`;
                }
            });

            const params = new URLSearchParams({
                where: sqlWhere,
                outFields: "project,line_name,start,end_,datum,source", 
                returnGeometry: "false", f: "json", token: apiKey
            });

            try {
                const response = await fetch(`${featureServiceUrl}?${params.toString()}`);
                const data = await response.json();
                if (data.features) processAndDraw(data.features, urlParams.get('date_'));
            } catch (error) { console.error("Fetch failed:", error); }
        }

        function processAndDraw(features, selectedDate) {
            const datumColors = { 'MHW': '#00E396', 'MLLW': '#FEB019', 'BMHW': '#008FFB' };

            const chartData = features.map(f => {
                const a = f.attributes;
                const sName = (a.source || 'STOFS').toUpperCase();
                const dType = (a.datum || 'N/A').toUpperCase();
                
                return {
                    x: [a.line_name, `(${sName})`, dType], 
                    y: [new Date(a.start).getTime(), new Date(a.end_).getTime()],
                    fillColor: datumColors[dType] || '#775DD0',
                    project: a.project || "N/A",
                    datum: dType,
                    source: sName,
                    originalLine: a.line_name
                };
            }).filter(item => !isNaN(item.y[0]) && !isNaN(item.y[1]));

            chartData.sort((a, b) => {
                if (a.originalLine !== b.originalLine) return a.originalLine.localeCompare(b.originalLine);
                if (a.source !== b.source) return a.source.localeCompare(b.source);
                return a.datum.localeCompare(b.datum);
            });

            let xAxisConfig = { 
                type: 'datetime', 
                labels: { datetimeUTC: false },
                tickAmount: 24 
            };
            if (selectedDate && selectedDate !== "null") {
                const parts = selectedDate.split('-');
                xAxisConfig.min = new Date(parts[0], parts[1] - 1, parts[2], 0, 0, 0).getTime();
                xAxisConfig.max = new Date(parts[0], parts[1] - 1, parts[2], 23, 59, 59).getTime();
            }

            const options = {
                series: [{ data: chartData }],
                chart: { 
                    type: 'rangeBar', 
                    height: '100%', 
                    foreColor: '#ccc', 
                    toolbar: { show: false },
                    events: {
                        mounted: function() { colorizeYAxisText(); },
                        updated: function() { colorizeYAxisText(); }
                    }
                },
                plotOptions: { bar: { horizontal: true, barHeight: '85%' } },
                xaxis: xAxisConfig,
                yaxis: {
                    labels: { style: { fontSize: '10px', fontWeight: 400 }, formatter: function(val) { return val; } }
                },
                // NEW: Added current time annotation line
                annotations: {
                    xaxis: [
                        {
                            x: new Date().getTime(),
                            strokeDashArray: 0,
                            borderColor: '#FF4560',
                            borderWidth: 2,
                            label: {
                                style: {
                                    color: '#fff',
                                    background: '#FF4560',
                                    fontSize: '11px',
                                    fontWeight: 600,
                                    padding: { left: 5, right: 5, top: 2, bottom: 2 }
                                },
                                text: 'NOW',
                                offsetY: 0
                            }
                        }
                    ]
                },
                grid: { 
                    borderColor: '#444', 
                    strokeDashArray: 4, 
                    xaxis: { lines: { show: true } },
                    yaxis: { lines: { show: true } }
                },
                tooltip: { 
                    theme: 'dark', 
                    followCursor: false, 
                    custom: function({ series, seriesIndex, dataPointIndex, w }) {
                        const d = w.globals.initialSeries[seriesIndex].data[dataPointIndex];
                        const sTime = new Date(d.y[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        const eTime = new Date(d.y[1]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        const sCol = d.source === 'PYDRO' ? '#eb97d8' : '#80ecf0';
                        
                        return `<div style="padding: 8px; background: #222; border: 1px solid ${d.fillColor}; color: #fff; font-size: 11px; line-height: 1.4;">` +
                            `<span><b style="color:${sCol}">Source: ${d.source}</b></span><br>` +
                            `<span><b>Project:</b> ${d.project}</span><br>` +
                            `<span><b>Line:</b> ${d.originalLine}</span><br>` +
                            `<span><b>Datum:</b> ${d.datum}</span><br>` +
                            `<span><b>Local Time:</b> ${sTime} - ${eTime}</span></div>`;
                    }
                }
            };

            if (myChart) {
                myChart.updateOptions(options);
            } else {
                myChart = new ApexCharts(document.querySelector("#chart_container"), options);
                myChart.render();
            }
        }

        buildUI();
        fetchWaterLevels();
        setInterval(fetchWaterLevels, 1000); 
    </script>
</body>
</html>
