<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Level Windows Gantt</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
        }
        #chart_container { width: 100%; height: 98vh; }
    </style>
</head>
<body>
    <div id="chart_container"></div>

    <script type="text/javascript">
        // 1. Configuration
        const featureServiceUrl = "https://services2.arcgis.com/C8EMgrsFcRFL6LrL/arcgis/rest/services/stofs_pred_utc/FeatureServer/0/query";
        const apiKey = "AAPTaH7OehDzKeYnCi_rxWuBJ0g..o1c0X6U0lqnbVVsF1hYhbFRQABeJbAleNkr1OEtiDLyGANPbe3XgyDCFF0wEKOz5f2GC__2Ff7YO972xlf5oshHeayTI7okMi2Ns0uJtjZ3YEF4dcGuH1GFkW4WjEf3uq94T7W2FyUePpmTH9oZO2oHzdwLB1PyBtWxGtAy8fb881ta7ch2-I7OJnMOXHEPN02w_TdzswKlcwjNAiJcpbRcFNFaVqkkFGf3xsrE710w8l3L5LSEW594ssQv4tMNvy9EtDsx18g..AT2_eCzFENFL"; 
        
        let myChart;
        let lastUrl = ""; 

        // 2. Fetch Logic
        async function fetchWaterLevels() {
            const currentUrl = window.location.search;
            if (currentUrl === lastUrl && myChart) return;
            lastUrl = currentUrl;

            const urlParams = new URLSearchParams(currentUrl);
            let sqlWhere = "1=1";

            // Supports your URL parameters: project, datum, line_name, date_, and line
            const filters = ['project', 'datum', 'line_name', 'date_', 'line'];
            
            filters.forEach(key => {
                const val = urlParams.get(key);
                if (val && val !== "" && val !== "null") {
                    if (key === 'line') {
                        sqlWhere += ` AND line_name = '${val}'`;
                    } else {
                        sqlWhere += ` AND ${key} = '${val}'`;
                    }
                }
            });

            const params = new URLSearchParams({
                where: sqlWhere,
                outFields: "line_name,start,end_", 
                returnGeometry: "false",
                f: "json",
                token: apiKey
            });

            try {
                const response = await fetch(`${featureServiceUrl}?${params.toString()}`);
                const data = await response.json();
                if (data.features) {
                    processAndDraw(data.features, urlParams.get('date_'));
                }
            } catch (error) {
                console.error("Fetch failed:", error);
            }
        }

        // 3. Drawing Logic
        function processAndDraw(features, selectedDate) {
            const chartData = features.map(f => {
                const a = f.attributes;
                return {
                    x: a.line_name || "Unknown",
                    y: [new Date(a.start).getTime(), new Date(a.end_).getTime()]
                };
            }).filter(item => !isNaN(item.y[0]) && !isNaN(item.y[1]));

            // Logic to show entire 24-hour day if date_ is filtered
            let xAxisConfig = { 
                type: 'datetime',
                labels: { datetimeUTC: true } 
            };

            if (selectedDate && selectedDate !== "null") {
                // Forces X-Axis to span from 00:00:00 to 23:59:59 of selected day
                xAxisConfig.min = new Date(selectedDate + "T00:00:00Z").getTime();
                xAxisConfig.max = new Date(selectedDate + "T23:59:59Z").getTime();
            }

            if (myChart) {
                myChart.updateOptions({
                    series: [{ data: chartData }],
                    xaxis: xAxisConfig
                });
            } else {
                const options = {
                    series: [{ data: chartData }],
                    chart: { 
                        type: 'rangeBar', 
                        height: '100%', 
                        foreColor: '#ccc',
                        toolbar: { show: false }
                    },
                    plotOptions: { 
                        bar: { horizontal: true, distributed: true, barHeight: '80%' } 
                    },
                    xaxis: xAxisConfig,
                    grid: { borderColor: '#444' },
                    tooltip: { theme: 'dark', x: { format: 'HH:mm' } },
                    legend: { show: false }
                };
                myChart = new ApexCharts(document.querySelector("#chart_container"), options);
                myChart.render();
            }
        }

        fetchWaterLevels();
        // Check for dashboard-driven URL changes every 500ms
        setInterval(fetchWaterLevels, 500);
    </script>
</body>
</html>
